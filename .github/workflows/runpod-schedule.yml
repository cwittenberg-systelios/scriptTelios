name: RunPod Debug

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch pod info
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          POD_ID: ${{ secrets.RUNPOD_POD_ID }}
        run: |
          echo "=== Mein Pod (per POD_ID) ==="
          curl -sS -X POST https://api.runpod.io/graphql \
            -H "Authorization: Bearer $RUNPOD_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"query { pod(input: {podId: \\\"$POD_ID\\\"}) { id name desiredStatus machineId gpuCount costPerHr machine { gpuDisplayName } } }\"}" \
            | python3 -m json.tool || echo "JSON-Parse fehlgeschlagen"

          echo ""
          echo "=== Alle meine Pods ==="
          curl -sS -X POST https://api.runpod.io/graphql \
            -H "Authorization: Bearer $RUNPOD_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"query":"query { myself { pods { id name desiredStatus machineId } } }"}' \
            | python3 -m json.tool || echo "JSON-Parse fehlgeschlagen"
