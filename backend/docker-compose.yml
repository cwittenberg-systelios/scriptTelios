# ════════════════════════════════════════════════════════════════
#  sysTelios KI-Dokumentation – Docker Compose
#
#  Services:
#    backend  – FastAPI (Port 8000)
#    db       – PostgreSQL + pgvector (Port 5432)
#    ollama   – Lokales LLM + Embedding-Modell (Port 11434)
#
#  Starten:
#    docker compose up -d
#
#  Einmalige Einrichtung nach erstem Start:
#    docker compose exec ollama ollama pull mistral-nemo        # LLM (~7.5 GB)
#    docker compose exec ollama ollama pull nomic-embed-text    # Embeddings (~0.3 GB)
#    docker compose exec ollama ollama pull llava               # OCR Vision-Fallback (~4.5 GB)
#
#  Optional (RTX 4090 / 5090):
#    docker compose exec ollama ollama pull llama3.1:70b-instruct-q4_K_M
# ════════════════════════════════════════════════════════════════

services:

  backend:
    build: .
    container_name: systelios-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      OLLAMA_HOST: http://ollama:11434
      DATABASE_URL: postgresql+asyncpg://systelios:systelios@db:5432/systelios
    volumes:
      - ./uploads:/app/uploads
      - ./outputs:/app/outputs
      - ./systelios.log:/app/systelios.log
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  db:
    image: pgvector/pgvector:pg16
    container_name: systelios-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: systelios
      POSTGRES_PASSWORD: systelios
      POSTGRES_DB: systelios
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U systelios"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: systelios-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama

    # GPU-Support (auskommentieren wenn NVIDIA-GPU vorhanden):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

volumes:
  postgres_data:
  ollama_models:
