# ════════════════════════════════════════════════════════════════
#  sysTelios KI-Dokumentation – Docker Compose für RunPod
#
#  Unterschiede zu docker-compose.yml (lokale Entwicklung):
#    - GPU-Support aktiviert (NVIDIA RTX 4090)
#    - Alle Daten auf Network Volume (/workspace)
#    - PostgreSQL-Daten persistent
#    - Ollama-Modelle persistent
#    - Uploads/Outputs/Logs persistent
#
#  Voraussetzung:
#    Network Volume unter /workspace eingebunden
#
#  Starten:
#    docker compose -f docker-compose.runpod.yml up -d
#
#  Kurzform (einmalig als Alias setzen):
#    alias dcu='docker compose -f /workspace/scriptTelios-updated/backend/docker-compose.runpod.yml'
#    dcu up -d
#    dcu logs -f backend
#
#  Einmalige Einrichtung nach ERSTEM Start:
#    docker compose -f docker-compose.runpod.yml exec ollama ollama pull mistral-nemo
#    docker compose -f docker-compose.runpod.yml exec ollama ollama pull nomic-embed-text
#    docker compose -f docker-compose.runpod.yml exec ollama ollama pull llava
#
#  Nach Pod-Neustart (Modelle bereits auf Network Volume):
#    docker compose -f docker-compose.runpod.yml build
#    docker compose -f docker-compose.runpod.yml up -d
# ════════════════════════════════════════════════════════════════

services:

  backend:
    build: .
    container_name: systelios-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      OLLAMA_HOST: http://ollama:11434
      DATABASE_URL: postgresql+asyncpg://systelios:systelios@db:5432/systelios
    volumes:
      - /workspace/uploads:/app/uploads
      - /workspace/outputs:/app/outputs
      - /workspace/systelios.log:/app/systelios.log
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  db:
    image: pgvector/pgvector:pg16
    container_name: systelios-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: systelios
      POSTGRES_PASSWORD: systelios
      POSTGRES_DB: systelios
    volumes:
      - /workspace/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U systelios"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: systelios-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - /workspace/ollama:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

# Keine named volumes – alles auf /workspace
